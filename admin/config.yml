backend:
  name: github
  repo: 1019cieun2/cieunhong
  branch: main

media_folder: images

collections:
  - name: posts
    label: Posts
    folder: _posts
    create: true
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime }
      - { label: Body, name: body, widget: markdown }
